<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>投资系统</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body { font-family: Arial; max-width:900px; margin:20px auto;}
input,button{width:100%;padding:10px;margin:6px 0;}
button{background:black;color:white;border:none;}
.card{margin-top:20px;padding:15px;background:#f5f5f5;}
.dot{display:inline-block;width:12px;height:12px;border-radius:50%;margin-right:6px;}
.green{background:green;}
.yellow{background:gold;}
.orange{background:orange;}
.red{background:red;}
</style>
</head>
<body>
<h2>📊 投资系统（完整版）</h2>
<input id="cape" placeholder="CAPE">
<input id="rate" placeholder="利率">
<input id="stock" placeholder="股票">
<input id="cash" placeholder="现金">
<div class="card" id="result"></div>
<!-- 决策矩阵 -->
<div class="card">
<h3>📊 决策矩阵</h3>
<table border="1" width="100%">
<tr><th>CAPE\利率</th><th>&lt;2%</th><th>2-4%</th><th>&gt;4%</th></tr>
<tr>
<td>&lt;20</td>
<td><span class="dot green"></span>25万</td>
<td><span class="dot green"></span>25万</td>
<td><span class="dot yellow"></span>15万</td>
</tr>
<tr>
<td>20-25</td>
<td><span class="dot green"></span>25万</td>
<td><span class="dot yellow"></span>15万</td>
<td><span class="dot orange"></span>10万</td>
</tr>
<tr>
<td>25-30</td>
<td><span class="dot yellow"></span>15万</td>
<td><span class="dot orange"></span>10万</td>
<td><span class="dot red"></span>5万</td>
</tr>
<tr>
<td>&gt;30</td>
<td><span class="dot orange"></span>10万</td>
<td><span class="dot red"></span>5万</td>
<td><span class="dot red"></span>5万</td>
</tr>
</table>
<p>
<span class="dot green"></span>低估　
<span class="dot yellow"></span>正常　
<span class="dot orange"></span>偏高　
<span class="dot red"></span>高估
</p>
</div>
<!-- 图表 -->
<div class="card">
<h3>📈 投资收益曲线</h3>
<canvas id="portfolioChart"></canvas>
</div>
<div class="card">
<h3>📊 利率曲线</h3>
<canvas id="rateChart"></canvas>
</div>
<div class="card">
<h3>📉 CAPE曲线（模拟）</h3>
<canvas id="capeChart"></canvas>
</div>
<script>

// ✅ 利率API（已换key）
async function loadRate(){
    try{
        let url = "https://api.stlouisfed.org/fred/series/observations?series_id=DGS10&api_key=271131e0378a5f9abaa7d465705f25ac&file_type=json";
        let res = await fetch(url);
        let data = await res.json();

        let obs = data.observations;
        let val;

        for(let i=obs.length-1;i>=0;i--){
            if(obs[i].value !== "."){
                val = obs[i].value;
                break;
            }
        }

        document.getElementById("rate").value = parseFloat(val).toFixed(2);

        drawRateChart(obs.slice(-50));

    }catch(e){
        alert("API失败");
    }
}

// ✅ 核心计算
function calc(){
let cape = +capeInput.value;
let rate = +rateInput.value;
let stock = +stockInput.value;
let cash = +cashInput.value;

let invest=15,alloc=0.7,color="yellow",status="正常";

if(cape>30 && rate>4){invest=5;alloc=0.3;color="red";status="高估";}
else if(cape<20){invest=25;alloc=0.9;color="green";status="低估";}
else if(cape>=25){invest=10;alloc=0.5;color="orange";status="偏高";}

let total=stock+cash;
let target=total*alloc;
let buy = stock<target ? Math.min(cash+invest,target-stock):0;

result.innerHTML=`${status}｜投入${invest}万｜买入${buy.toFixed(2)}万`;

drawPortfolio();
drawCape();
}

// 📈 投资收益（模拟）
function drawPortfolio(){
let labels=[],data=[];
let value=100;

for(let i=0;i<50;i++){
value*=1+ (Math.random()*0.02-0.01);
labels.push(i);
data.push(value);
}

new Chart(document.getElementById("portfolioChart"),{
type:'line',
data:{labels:labels,datasets:[{label:'资产',data:data}]}
});
}

// 📊 利率图
function drawRateChart(obs){
let labels=[],data=[];

obs.forEach(o=>{
if(o.value !== "."){
labels.push(o.date);
data.push(o.value);
}
});

new Chart(document.getElementById("rateChart"),{
type:'line',
data:{labels:labels,datasets:[{label:'利率',data:data}]}
});
}

// 📉 CAPE图（模拟）
function drawCape(){
let labels=[],data=[];
let v=20;

for(let i=0;i<50;i++){
v+=Math.random()*2-1;
labels.push(i);
data.push(v);
}

new Chart(document.getElementById("capeChart"),{
type:'line',
data:{labels:labels,datasets:[{label:'CAPE',data:data}]}
});
}

// 修复id
const capeInput=document.getElementById("cape");
const rateInput=document.getElementById("rate");
const stockInput=document.getElementById("stock");
const cashInput=document.getElementById("cash");
const result=document.getElementById("result");

</script>
</body>
</html>
:::
