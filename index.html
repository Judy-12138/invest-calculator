<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>投资策略计算器</title>

<style>
body {
    font-family: Arial;
    max-width: 700px;
    margin: 30px auto;
}
h2 { text-align: center; }

input {
    width: 100%;
    padding: 10px;
    margin: 6px 0;
}

button {
    width: 100%;
    padding: 12px;
    background: black;
    color: white;
    border: none;
    cursor: pointer;
}

.card {
    margin-top: 20px;
    padding: 15px;
    background: #f5f5f5;
}

.green { color: green; }
.orange { color: orange; }
.red { color: red; }
</style>

</head>

<body>

<h2>📊 投资策略计算器</h2>

<input id="cape" placeholder="CAPE">
<input id="rate" placeholder="利率 %">
<input id="stock" placeholder="股票（万）">
<input id="cash" placeholder="现金（万）">

<button type="button" onclick="calc()">计算</button>

<div class="card" id="result">等待输入...</div>

<script>
function calc() {

    const cape = parseFloat(document.getElementById("cape").value);
    const rate = parseFloat(document.getElementById("rate").value);
    const stock = parseFloat(document.getElementById("stock").value);
    const cash = parseFloat(document.getElementById("cash").value);

    if (isNaN(cape) || isNaN(rate) || isNaN(stock) || isNaN(cash)) {
        document.getElementById("result").innerHTML = "❗请输入完整数值";
        return;
    }

    let invest = 15;
    let alloc = 0.7;
    let status = "正常";
    let color = "orange";

    if (cape > 30 && rate > 4) {
        invest = 5;
        alloc = 0.3;
        status = "高估";
        color = "red";
    } else if (cape < 20) {
        invest = 25;
        alloc = 0.9;
        status = "低估";
        color = "green";
    } else if (cape >= 25 && rate > 4) {
        invest = 5;
        alloc = 0.3;
        status = "偏高";
        color = "red";
    } else if (cape >= 25) {
        invest = 10;
        alloc = 0.5;
        status = "偏高";
        color = "orange";
    }

    const total = stock + cash;
    const targetStock = total * alloc;

    let buy = 0;
    if (stock < targetStock) {
        buy = Math.min(cash + invest, targetStock - stock);
    }

    document.getElementById("result").innerHTML =
        "<b class='" + color + "'>市场状态：" + status + "</b><br><br>" +
        "总资产：" + total + " 万<br>" +
        "目标仓位：" + (alloc*100).toFixed(0) + "%<br>" +
        "本月投入：" + invest + " 万<br>" +
        "建议买入：" + buy.toFixed(2) + " 万";
}
</script>

</body>
</html>
