7"}
<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>投资计算器</title>

<style>
body {
    font-family: Arial;
    max-width: 700px;
    margin: 20px auto;
}
h2 { text-align:center; }

input, button {
    width:100%;
    padding:12px;
    margin:8px 0;
    font-size:16px;
}

button {
    background:black;
    color:white;
    border:none;
    cursor:pointer;
}

.card {
    margin-top:20px;
    padding:15px;
    background:#f5f5f5;
}

.green{color:green;}
.orange{color:orange;}
.red{color:red;}

table{
    width:100%;
    border-collapse:collapse;
}
td,th{
    border:1px solid #ccc;
    padding:6px;
    text-align:center;
}
</style>

</head>

<body>

<h2>📊 投资策略计算器</h2>

<button type="button" onclick="loadRate()">📡 自动获取利率</button>

<input id="cape" placeholder="CAPE（例如 33）">
<input id="rate" placeholder="利率 %（例如 4.2）">
<input id="stock" placeholder="股票（万）">
<input id="cash" placeholder="现金（万）">

<button type="button" onclick="calc()">👉 计算</button>

<div class="card" id="result">等待输入...</div>

<!-- 决策矩阵 -->
<div class="card">
<h3>📊 投资决策矩阵</h3>
<table>
<tr><th>CAPE \ 利率</th><th><2%</th><th>2-4%</th><th>>4%</th></tr>
<tr><td><20</td><td>25万</td><td>25万</td><td>15万</td></tr>
<tr><td>20-25</td><td>25万</td><td>15万</td><td>10万</td></tr>
<tr><td>25-30</td><td>15万</td><td>10万</td><td>5万</td></tr>
<tr><td>>30</td><td>10万</td><td>5万</td><td>5万</td></tr>
</table>
</div>

<!-- 仓位 -->
<div class="card">
<h3>📈 仓位规则</h3>
<ul>
<li>🟢 低估 → 90% 股票</li>
<li>🟡 正常 → 70%</li>
<li>🟠 偏高 → 50%</li>
<li>🔴 高估 → 30%</li>
</ul>
</div>

<script>

// ✅ 获取利率（已修复写法）
async function loadRate(){
    try{
        const url = "https://api.stlouisfed.org/fred/series/observations?series_id=DGS10&api_key=9767bb73e374e7031f93d7e5553b17cd&file_type=json";

        const res = await fetch(url);
        const data = await res.json();

        let observations = data.observations;

        // 找最后一个非 "." 的值
        let rate = null;
        for(let i = observations.length-1; i >= 0; i--){
            if(observations[i].value !== "."){
                rate = observations[i].value;
                break;
            }
        }

        if(rate){
            document.getElementById("rate").value = parseFloat(rate).toFixed(2);
            alert("利率已更新");
        }else{
            alert("获取失败");
        }

    }catch(e){
        alert("API错误，请手动输入");
        console.log(e);
    }
}


// ✅ 计算逻辑（完全稳定版）
function calc(){

    const cape = parseFloat(document.getElementById("cape").value);
    const rate = parseFloat(document.getElementById("rate").value);
    const stock = parseFloat(document.getElementById("stock").value);
    const cash = parseFloat(document.getElementById("cash").value);

    if(isNaN(cape)||isNaN(rate)||isNaN(stock)||isNaN(cash)){
        document.getElementById("result").innerHTML = "❗请输入完整数值";
        return;
    }

    let invest=15,alloc=0.7,status="正常",color="orange";

    if(cape>30 && rate>4){
        invest=5;alloc=0.3;status="高估";color="red";
    }
    else if(cape<20){
        invest=25;alloc=0.9;status="低估";color="green";
    }
    else if(cape>=25 && rate>4){
        invest=5;alloc=0.3;status="偏高（利率压制）";color="red";
    }
    else if(cape>=25){
        invest=10;alloc=0.5;status="偏高";color="orange";
    }

    const total = stock + cash;
    const target = total * alloc;

    let buy = 0;
    if(stock < target){
        buy = Math.min(cash + invest, target - stock);
    }

    document.getElementById("result").innerHTML =
        "<b class='"+color+"'>市场状态："+status+"</b><br><br>" +
        "总资产："+total+" 万<br>" +
        "目标仓位："+(alloc*100).toFixed(0)+"%<br>" +
        "本月投入："+invest+" 万<br>" +
        "建议买入："+buy.toFixed(2)+" 万";
}

</script>

</body>
</ht
